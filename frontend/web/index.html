<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upgo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 400px; margin: 80px auto; padding: 24px; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { text-align: center; margin-bottom: 24px; font-size: 24px; color: #1a1a1a; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #555; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus { border-color: #4a9eff; }
    button { width: 100%; padding: 12px; background: #4a9eff; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    button:hover { background: #3a8eef; }
    .error { color: #e74c3c; font-size: 13px; margin-top: 8px; display: none; }
    .success { color: #2ecc71; font-size: 13px; margin-top: 8px; display: none; }
    .nav { text-align: center; margin-top: 16px; font-size: 14px; }
    .nav a { color: #4a9eff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Upgo</h1>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="email" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button onclick="handleLogin()">登录</button>
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>
  </div>
  <script>
    const AUTH_API = window.location.origin + '/api';

    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('successMsg').style.display = 'none';

      try {
        const resp = await fetch(AUTH_API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, platform: 'web' }),
        });
        if (resp.ok) {
          document.getElementById('successMsg').textContent = '登录成功！';
          document.getElementById('successMsg').style.display = 'block';
        } else {
          const err = await resp.json();
          document.getElementById('errorMsg').textContent = err.error || '登录失败';
          document.getElementById('errorMsg').style.display = 'block';
        }
      } catch (e) {
        document.getElementById('errorMsg').textContent = '网络错误';
        document.getElementById('errorMsg').style.display = 'block';
      }
    }
  </script>
</body>
</html>
