syntax = "proto3";

package user;

service UserService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc SubmitKyc(SubmitKycRequest) returns (SubmitKycResponse);
  rpc ApproveKyc(ApproveKycRequest) returns (ApproveKycResponse);
  rpc RejectKyc(RejectKycRequest) returns (RejectKycResponse);
}

// --- Register ---
message RegisterRequest {
  string email = 1;
  string password = 2;
  string nickname = 3;
  optional string phone = 4;
}

message RegisterResponse {
  string user_id = 1;
  string status = 2;
}

// --- GetProfile ---
message GetProfileRequest {
  string user_id = 1;
}

message GetProfileResponse {
  string user_id = 1;
  string email = 2;
  optional string phone = 3;
  string nickname = 4;
  string kyc_status = 5;
  string account_status = 6;
  string created_at = 7;
}

// --- UpdateProfile ---
message UpdateProfileRequest {
  string user_id = 1;
  optional string nickname = 2;
  optional string phone = 3;
}

message UpdateProfileResponse {
  string user_id = 1;
  string nickname = 2;
  optional string phone = 3;
}

// --- SubmitKyc ---
message SubmitKycRequest {
  string user_id = 1;
  string real_name = 2;
  string id_number = 3;
  bytes id_photo_front = 4;
  bytes id_photo_back = 5;
}

message SubmitKycResponse {
  string kyc_status = 1;
}

// --- ApproveKyc ---
message ApproveKycRequest {
  string user_id = 1;
  string reviewer_id = 2;
}

message ApproveKycResponse {
  string kyc_status = 1;
}

// --- RejectKyc ---
message RejectKycRequest {
  string user_id = 1;
  string reviewer_id = 2;
  string reason = 3;
}

message RejectKycResponse {
  string kyc_status = 1;
}
