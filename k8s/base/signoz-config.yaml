apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  labels:
    app: signoz-otel-collector
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 1s
        send_batch_size: 100

    exporters:
      # Debug: log all received data
      logging:
        loglevel: debug

      # SigNoz: export traces and metrics to ClickHouse
      clickhousetraces:
        datasource: tcp://clickhouse:9000/signoz_traces
        timeout: 5s
        sending_queue:
          queue_size: 1000
        retry_on_failure:
          enabled: true
          max_elapsed_time: 60s

      clickhousemetricswrite:
        endpoint: tcp://clickhouse:9000
        database: signoz_metrics
        resource_to_telemetry_conversion:
          enabled: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging, clickhousetraces]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging, clickhousemetricswrite]
      extensions:
        - health_check

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
