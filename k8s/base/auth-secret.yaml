apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  labels:
    app: auth
type: Opaque
stringData:
  # ⚠️ Production: Replace with real values, managed by external-secrets or sealed-secrets
  JWT_SECRET: "dev-jwt-secret-change-in-production-min-32-chars-long"
  DATABASE_URL: "postgres://postgres:postgres@postgres:5432/upgo_auth"
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-db-secret
  labels:
    app: auth
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "upgo_auth"
