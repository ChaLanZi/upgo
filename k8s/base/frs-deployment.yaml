apiVersion: apps/v1
kind: Deployment
metadata:
  name: frs
  labels:
    app: frs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frs
  template:
    metadata:
      labels:
        app: frs
    spec:
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for MinIO to be ready..."
              until nc -z minio 9000; do sleep 2; done
              echo "MinIO is ready!"
      containers:
        - name: frs
          image: upgo-frs:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50054
              name: grpc
            - containerPort: 9094
              name: http
          env:
            - name: HTTP_ADDR
              value: "0.0.0.0:9094"
            - name: GRPC_ADDR
              value: "0.0.0.0:50054"
            - name: LOG_LEVEL
              value: "info"
            - name: S3_ENDPOINT
              value: "http://minio:9000"
            - name: S3_REGION
              value: "us-east-1"
            - name: S3_ACCESS_KEY
              value: "minioadmin"
            - name: S3_SECRET_KEY
              value: "minioadmin"
            - name: S3_BUCKET
              value: "upgo-files"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /api/files/list
              port: 9094
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/files/list
              port: 9094
            initialDelaySeconds: 10
            periodSeconds: 10
